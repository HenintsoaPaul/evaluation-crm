<link th:href="@{/css/pages/inbox.css}" rel="stylesheet">

<!-- HTML5 Shim and Respond.js IE8 support of HTML5 elements and media queries -->

<script src="https://oss.maxcdn.com/libs/html5shiv/3.7.0/html5shiv.js"></script>

<body class="skin-blue fixed-layout">
<!-- ============================================================== -->
<!-- Preloader - style you can find in spinners.css -->
<!-- ============================================================== -->
<div class="preloader">
    <div class="loader">
        <div class="loader__figure"></div>
        <p class="loader__label">CRM</p>
    </div>
</div>
<!-- ============================================================== -->
<!-- Main wrapper - style you can find in pages.scss -->
<!-- ============================================================== -->
<div id="main-wrapper">
    <!-- ============================================================== -->
    <!-- Topbar header - style you can find in pages.scss -->
    <!-- ============================================================== -->
    <div th:insert="~{/general/header.html}"></div>
    <!-- ============================================================== -->
    <!-- End Topbar header -->
    <!-- ============================================================== -->
    <!-- ============================================================== -->
    <!-- Left Sidebar - style you can find in sidebar.scss  -->
    <!-- ============================================================== -->
    <div th:insert="~{/general/left-sidebar.html}"></div>
    <!-- ============================================================== -->
    <!-- End Left Sidebar - style you can find in sidebar.scss  -->
    <!-- ============================================================== -->
    <!-- ============================================================== -->
    <!-- Page wrapper  -->
    <!-- ============================================================== -->
    <div class="page-wrapper">
        <!-- ============================================================== -->
        <!-- Container fluid  -->
        <!-- ============================================================== -->
        <div class="container-fluid">
            <!-- ============================================================== -->
            <!-- Bread crumb and right sidebar toggle -->
            <!-- ============================================================== -->
            <div th:insert="~{/general/page-titles.html}"></div>
            <!-- ============================================================== -->
            <!-- End Bread crumb and right sidebar toggle -->
            <!-- ============================================================== -->
            <!-- ============================================================== -->
            <!-- Start Page Content -->
            <!-- ============================================================== -->
            <div class="row">
                <div class="col-lg-12">
                    <!--modal-->
                    <div class="modal fade" id="confirmationModal" tabindex="-1" role="dialog"
                         aria-labelledby="confirmationModalLabel" aria-hidden="true">
                        <div class="modal-dialog" role="document">
                            <div class="modal-content">
                                <div class="modal-header">
                                    <h5 class="modal-title" id="confirmationModalLabel">Confirmation des données</h5>
                                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                        <span aria-hidden="true">&times;</span>
                                    </button>
                                </div>
                                <div class="modal-body">
                                    <h6>Etes-vous sur?</h6>
                                    <p id="erreurAlerteBudget"></p>
                                    <p id="erreurDepassementBudget"></p>
                                </div>
                                <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Annuler
                                    </button>
                                    <button type="button" class="btn btn-primary" id="confirmSubmit">Continuer</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!--form-->
                    <div class="card">
                        <div class="card-body">
                            <h4 class="card-title">Update Expense</h4>
                            <form th:object="${expense}" id="expenseForm" th:action="@{/expense/update-expense}"
                                  method="post">
                                <input type="hidden" th:field="*{id}">

                                <!--amount-->
                                <label class="m-t-20" for="amount_expense">Amount:</label>
                                <div class="input-group">
                                    <input type="number" id="amount_expense" th:field="*{amount}"
                                           class="form-control">
                                </div>
                                <div class="input-group">
                                    <span class="text-danger font-weight-bold"
                                          th:if="${#fields.hasErrors('amount')}"
                                          th:errors="*{amount}"></span>
                                </div>

                                <div class="row">
                                    <!--budget_alert_config-->
                                    <div class="col-6">
                                        <label class="m-t-20" for="budget_alert_config">Alerte (%):</label>
                                        <div class="input-group">
                                            <input type="text" id="budget_alert_config"
                                                   class="form-control"
                                                   readonly
                                                   th:value="${budgetAlertConfig.rate}">
                                        </div>
                                        <label class="m-t-20" for="amount_alerte">Amount Alert:</label>
                                        <div class="input-group">
                                            <input type="text" id="amount_alerte"
                                                   class="form-control"
                                                   readonly
                                                   th:value="${(budgetAlertConfig.rate / 100) * budget.amountLimit}">
                                        </div>
                                    </div>
                                    <!--budget-->
                                    <div class="col-6">
                                        <label class="m-t-20" for="amount_limit">Amount Limit:</label>
                                        <div class="input-group">
                                            <input type="text" id="amount_limit"
                                                   class="form-control"
                                                   readonly
                                                   th:value="${budget.amountLimit}">
                                        </div>
                                        <label class="m-t-20" for="amount_remain">Amount Remain:</label>
                                        <div class="input-group">
                                            <input type="text" id="amount_remain"
                                                   class="form-control"
                                                   readonly
                                                   th:value="${budget.amountRemain}">
                                        </div>
                                    </div>
                                </div>

                                <button type="submit" class="btn btn-primary m-t-20">Update expense</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ============================================================== -->
            <!-- End Page Content -->
            <!-- ============================================================== -->
            <!-- ============================================================== -->
            <!-- Right sidebar -->
            <!-- ============================================================== -->
            <!-- .right-sidebar -->
            <div th:insert="~{/general/right-sidebar.html}"></div>
            <!-- ============================================================== -->
            <!-- End Right sidebar -->
            <!-- ============================================================== -->
        </div>
        <!-- ============================================================== -->
        <!-- End Container fluid  -->
        <!-- ============================================================== -->
    </div>
    <!-- ============================================================== -->
    <!-- End Page wrapper  -->
    <!-- ============================================================== -->
    <!-- ============================================================== -->
    <!-- footer -->
    <!-- ============================================================== -->
    <div th:insert="~{/general/footer.html}"></div>
    <!-- ============================================================== -->
    <!-- End footer -->
    <!-- ============================================================== -->
</div>
<!-- ============================================================== -->
<!-- End Wrapper -->
<!-- ============================================================== -->
<!-- ============================================================== -->
<!-- All Jquery -->
<!-- ============================================================== -->

<script th:src="@{/js/library/jquery-3.2.1.min.js}" type="text/javascript"></script>
<script th:inline="javascript">
    const home = /*[[${home}]]*/ null;
    const tauxAlerte = /*[[${budgetAlertConfig.rate}]]*/ null;
    const amountLimit = /*[[${budget.amountLimit}]]*/ null;
    const amountRemain = /*[[${budget.amountRemain}]]*/ null;
    const debutAlerte = amountLimit * (tauxAlerte / 100);

    const oldAmountExpense =  /*[[${expense.amount}]]*/ null;

    $(document).ready(function () {
        // fetch budget by client
        $('#customerId').change(function () {
            const customerId = $(this).val();

            if (customerId !== "") {
                $.ajax({
                    url: '/budget/api',
                    data: {customerId: customerId},
                    type: 'GET',
                    beforeSend: function () {
                        $('#budget').prop('disabled', true);
                    },
                    success: function (response) {
                        $('#budget').empty();
                        $('#budget').append($('<option></option>').text('Sélectionnez un budget'));

                        console.log(response);

                        $.each(response, function (index, budget) {
                            $('#budget').append($('<option></option>')
                                .attr('value', `${budget.id}--${budget.amountLimit}--${budget.amountRemain}`)
                                .text(`${budget.name}--${budget.amountLimit}--${budget.amountRemain}`));
                        });

                        $('#budget').prop('disabled', false);
                    },
                    error: function (xhr, status, error) {
                        console.error(error);
                        alert('Erreur lors du chargement des budgets');
                        $('#budget').prop('disabled', false);
                    }
                });
            } else {
                $('#budget').empty();
                $('#budget').append($('<option></option>').text('Sélectionnez un budget'));
            }
        });

        // Soumission du formulaire
        $('#expenseForm').submit(function (e) {
            e.preventDefault();
            if (!validateForm()) {
                return;
            }
            $('#confirmationModal').modal('show');
        });

        // Bouton Continuer
        $('#confirmSubmit').click(function () {
            $('#confirmationModal').modal('hide');
            $('#expenseForm').unbind('submit').submit();
        });

        // Validation du formulaire
        function validateForm() {
            let isValid = true;
            let isAlerteBudget = false;
            let isDepassementBudget = false;

            let amount = $('#amount_expense').val();
            if (amount === '' || isNaN(amount) || parseFloat(amount) <= 0) {
                isValid = false;
                $('#amount_expense').addClass('is-invalid');
            } else {
                $('#amount_expense').removeClass('is-invalid');
            }

            // averina ilay taloha, satria update
            const futurRemain = amountRemain - parseFloat(amount) + oldAmountExpense;
            isAlerteBudget = futurRemain <= debutAlerte;
            isDepassementBudget = futurRemain < 0;

            if (isAlerteBudget) {
                $('#erreurAlerteBudget').html(`
    <b>Alerte de budget !</b><br>
    Montant début alerte: ${debutAlerte}<br>
    Montant demandé: ${amount}<br>
    Montant restant après cette opération: ${futurRemain}
`);
            } else {
                $('#erreurAlerteBudget').html('');
            }

            if (isDepassementBudget) {
                $('#erreurDepassementBudget').html(`
    <b>Depassement de budget!</b><br>
    Montant restant: ${amountRemain}<br>
    Montant demandé: ${amount}<br>
    Montant restant après cette opération: ${futurRemain}
`);
            } else {
                $('#erreurDepassementBudget').html('');
            }

            return isValid;
        }
    });
</script>
